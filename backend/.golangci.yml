run:
  timeout: 5m
  tests: false
  skip-dirs:
    - graph/generated
    - graph/model

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - typecheck
    - gocritic
    - revive
    - gosimple
    - unused

linters-settings:
  govet:
    check-shadowing: true
  
  errcheck:
    check-type-assertions: true
    check-blank: false
  
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - commentedOutCode
      - whyNoLint
  
  revive:
    ignore-generated-header: true
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf

issues:
  exclude-rules:
    # Exclude some linters from running on test files
    - path: _test\.go
      linters:
        - gocritic
        - errcheck
    
    # Exclude generated files
    - path: generated
      linters:
        - golint
        - revive
        - gocritic
    
    # Allow fmt.Println in main package
    - path: cmd/
      linters:
        - forbidigo
  
  max-issues-per-linter: 50
  max-same-issues: 10