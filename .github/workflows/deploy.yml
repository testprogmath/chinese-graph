name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
        run: |
          ssh ${USER}@${HOST} << 'ENDSSH'
            set -e
            
            # Configuration
            APP_DIR=~/apps/chinese-app
            REPO_URL=https://github.com/testprogmath/chinese-graph.git
            
            # Ensure app directory exists
            mkdir -p $APP_DIR
            cd $APP_DIR
            
            # Clone or update repository
            if [ ! -d ".git" ]; then
              echo "Cloning repository..."
              git clone $REPO_URL .
            else
              echo "Updating repository..."
              git fetch origin
              git reset --hard origin/main
            fi
            
            # Create .env file if it doesn't exist
            if [ ! -f .env ]; then
              echo "Creating .env file..."
              cat > .env << 'EOF'
          NEO4J_PASSWORD=chinesegraph123
          NODE_ENV=production
          EOF
            fi
            
            # Clean up any previous nginx directories (nginx is no longer used)
            rm -rf nginx/
            
            # Deploy services
            echo "Deploying services..."
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 15
            
            # Clean up old images
            docker image prune -f
            
            # Show final status
            echo "Deployment complete. Service status:"
            docker compose -f docker-compose.prod.yml ps
          ENDSSH

      - name: Health Check
        env:
          HOST: ${{ secrets.HOST }}
        run: |
          sleep 5
          echo "Checking service health..."
          
          # Check if Caddy HTTPS is responding
          if curl -f -s -o /dev/null -w "%{http_code}" https://${HOST} | grep -q "200"; then
            echo "✅ HTTPS health check passed!"
          else
            echo "❌ HTTPS health check failed!"
            exit 1
          fi