name: 🐛 Bug Report
description: Report a bug in Chinese Learning Graph
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - annakhvorostianova

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below to help us fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Graph visualization
        - Word search
        - Learning stats
        - Authentication
        - API/GraphQL
        - Database
        - UI/UX
        - Performance
      default: 0
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 🔴 Critical (app unusable)
        - 🟠 Major (feature broken)
        - 🟡 Minor (workaround exists)
        - 🟢 Trivial (cosmetic)
      default: 2
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details
      placeholder: |
        - Browser: Chrome 120
        - OS: macOS 14
        - Node version: 20.x
        - Go version: 1.25

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any relevant error messages or console output
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots to help explain the problem